<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | 길좀비켜!</title>
  </head>
  <body style="text-align: center; padding: 0; border: 0; margin: 0;">
    <div id="debug-log" style="position:fixed;top:0;left:0;right:0;max-height:25vh;overflow-y:auto;background:rgba(0,0,0,0.85);color:#0f0;font:10px monospace;text-align:left;padding:2px;z-index:9999;pointer-events:none;"></div>
    <canvas id="unity-canvas" width=414 height=896 tabindex="-1" style="width: 414px; height: 896px; background: #231F20"></canvas>
    <script>
      var debugEl = document.getElementById('debug-log');
      var lc = 0;
      function dlog(m, c) {
        lc++;
        var d = document.createElement('div');
        d.textContent = lc + ': ' + m;
        if (c) d.style.color = c;
        debugEl.appendChild(d);
        debugEl.scrollTop = debugEl.scrollHeight;
        if (lc > 80) debugEl.firstChild.remove();
      }
      window.onerror = function(m,u,l) { dlog('JS_ERR: '+m+' @'+l,'red'); };
      var _e = console.error, _w = console.warn;
      console.error = function() { _e.apply(console,arguments); dlog('ERR: '+Array.from(arguments).join(' '),'red'); };
      console.warn = function() { _w.apply(console,arguments); dlog('WARN: '+Array.from(arguments).join(' '),'yellow'); };
    </script>
    <script src="Build/Android-PlayStore.loader.js"></script>
    <script>
      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        var canvas = document.querySelector("#unity-canvas");
        canvas.style.width = "100%";
        canvas.style.height = "100%";
        canvas.style.position = "fixed";
        document.body.style.textAlign = "left";
      }

      createUnityInstance(document.querySelector("#unity-canvas"), {
        arguments: [],
        dataUrl: "Build/Android-PlayStore.data",
        frameworkUrl: "Build/Android-PlayStore.framework.js",
        codeUrl: "Build/Android-PlayStore.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Hadeulsoft",
        productName: "길좀비켜!",
        productVersion: "0.9.130",
        devicePixelRatio: 1,
      }).then(function(u) {
        dlog('Unity OK', '#0f0');
      }).catch(function(m) {
        dlog('UNITY_FAIL: '+m, 'red');
      });
    </script>
  </body>
</html>
