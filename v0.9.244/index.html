<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zombie Truck Squad</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
      #unity-container {
        width: 100%; height: 100%;
        display: flex; justify-content: center; align-items: center;
      }
      #unity-canvas { background: #231F20; }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
    </div>
    <script>
      // 9:16 세로 고정비율, 남는 부분 검정
      var RATIO_W = 9, RATIO_H = 16;
      function resizeCanvas() {
        var vw = window.innerWidth, vh = window.innerHeight;
        var w, h;
        if (vh / vw > RATIO_H / RATIO_W) {
          w = vw; h = vw * RATIO_H / RATIO_W;
        } else {
          h = vh; w = vh * RATIO_W / RATIO_H;
        }
        var c = document.getElementById('unity-canvas');
        c.style.width = Math.floor(w) + 'px';
        c.style.height = Math.floor(h) + 'px';
      }
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);
    </script>
    <script src="Build/Android-PlayStore.loader.js"></script>
    <script>
      createUnityInstance(document.querySelector("#unity-canvas"), {
        arguments: [],
        dataUrl: "Build/Android-PlayStore.data.unityweb?v=1773384678",
        frameworkUrl: "Build/Android-PlayStore.framework.js.unityweb?v=1773384678",
        codeUrl: "Build/Android-PlayStore.wasm.unityweb?v=1773384678",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Hadeulsoft",
        productName: "Zombie Truck Squad",
        productVersion: "0.9.244",
      }).then((unityInstance) => {
      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
</html>
